name: Create Aurora DSQL Cluster

# Per-run DSQL cluster (mirrors awslabs/aurora-dsql-connectors).

permissions: {}

on:
  workflow_call:
    inputs:
      workflow_name:
        required: true
        type: string
        description: "Name of the calling workflow (used for cluster naming)"
    secrets:
      IAM_ROLE:
        required: true
    outputs:
      cluster-id:
        description: "The cluster identifier"
        value: ${{ jobs.create.outputs.cluster-id }}
      cluster-endpoint:
        description: "The cluster endpoint"
        value: ${{ jobs.create.outputs.cluster-endpoint }}
      region:
        description: "The AWS region"
        value: ${{ jobs.create.outputs.region }}

env:
  AWS_REGION: us-east-1
  MAX_RETRIES: 5
  INITIAL_BACKOFF: 10

jobs:
  create:
    name: Create Aurora DSQL Cluster
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
    outputs:
      cluster-id: ${{ steps.create.outputs.cluster-id }}
      cluster-endpoint: ${{ steps.create.outputs.cluster-endpoint }}
      region: ${{ steps.create.outputs.region }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6
        with:
          role-to-assume: ${{ secrets.IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create cluster
        id: create
        run: |
          CLUSTER_NAME="${{ inputs.workflow_name }}-${{ github.run_id }}"

          for attempt in $(seq 1 "$MAX_RETRIES"); do
            RESULT=$(aws dsql create-cluster \
              --no-deletion-protection-enabled \
              --tags "Name=$CLUSTER_NAME,Repo=${{ github.repository }},Type=integration-test" 2>&1) && break
            BACKOFF=$((INITIAL_BACKOFF * attempt))
            echo "Attempt $attempt failed, retrying in ${BACKOFF}s..."
            sleep "$BACKOFF"
          done

          CLUSTER_ID=$(echo "$RESULT" | jq -r '.identifier')
          if [ -z "$CLUSTER_ID" ] || [ "$CLUSTER_ID" = "null" ]; then
            echo "Failed to create cluster: $RESULT"
            exit 1
          fi

          # Persist the id to outputs IMMEDIATELY, before `wait`. If the
          # runner is cancelled or crashes during `wait` the cluster is
          # already created and tagged; without this line the output is
          # empty and the `delete-cluster` step has nothing to target,
          # leaving an orphaned cluster.
          {
            echo "cluster-id=$CLUSTER_ID"
            echo "cluster-endpoint=${CLUSTER_ID}.dsql.${{ env.AWS_REGION }}.on.aws"
            echo "region=${{ env.AWS_REGION }}"
          } >> "$GITHUB_OUTPUT"

          echo "Waiting for cluster $CLUSTER_ID to become active..."
          aws dsql wait cluster-active --identifier "$CLUSTER_ID"

      - name: Clean up orphaned cluster on failure
        if: ${{ failure() || cancelled() }}
        run: |
          # Belt-and-suspenders: if `wait` failed or the job was
          # cancelled, the cluster may exist but no caller will receive
          # a cluster-id output, so the downstream delete job won't run.
          # Delete it here using the id captured by the create step.
          CLUSTER_ID="${{ steps.create.outputs.cluster-id }}"
          if [ -n "$CLUSTER_ID" ] && [ "$CLUSTER_ID" != "null" ]; then
            echo "Deleting orphan cluster $CLUSTER_ID"
            aws dsql delete-cluster --identifier "$CLUSTER_ID" || true
          fi
